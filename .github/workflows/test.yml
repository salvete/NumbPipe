name: NumbPipe Module Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)

      - name: Build kernel module
        run: make

      - name: Run basic tests
        run: sudo bash tests/basic.sh

      - name: Run blocking tests
        run: sudo bash tests/blocking_test.sh
